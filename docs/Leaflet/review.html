<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>187 리플렛 검토</title>
<style>
  :root{ --teal:#084b46; --gold:#c79a3b; --bg:#eef0f2; --line:#d8dce0; --ink:#1f2937; --muted:#6b7280; }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; }
  body{ font-family:'Noto Sans KR',system-ui,sans-serif; color:var(--ink); background:var(--bg); display:flex; flex-direction:column; height:100vh; }

  header{ flex:0 0 auto; background:var(--teal); color:#fff; padding:10px 16px; display:flex; align-items:center; gap:14px; box-shadow:0 2px 8px rgba(0,0,0,.18); z-index:5; }
  header h1{ font-size:16px; font-weight:700; letter-spacing:-.3px; }
  header .spacer{ flex:1; }
  header .cur{ font-size:12px; background:rgba(255,255,255,.16); padding:5px 11px; border-radius:999px; font-weight:700; }
  .btn{ border:0; border-radius:8px; padding:9px 16px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .btn-primary{ background:var(--gold); color:#2a1d00; }
  .btn-primary:hover{ filter:brightness(1.06); }
  .btn-ghost{ background:rgba(255,255,255,.16); color:#fff; }
  .btn-ghost:hover{ background:rgba(255,255,255,.26); }
  .saved{ font-size:11px; color:#cdeee3; min-width:60px; }

  main{ flex:1; display:flex; min-height:0; }
  .compare{ flex:1 1 auto; min-width:0; display:flex; gap:1px; background:var(--line); }
  .pane{ flex:1 1 50%; min-width:0; display:flex; flex-direction:column; background:#555; }
  .pane-hd{ flex:0 0 auto; background:#22312e; color:#cfe6df; font-size:12px; font-weight:700; padding:5px 12px; letter-spacing:.3px; }
  .pane-hd.ko{ background:#0d2a26; color:#fff; }
  .pane .wrap{ flex:1; overflow:hidden; position:relative; }
  .pane iframe{ width:100%; height:100%; border:0; display:block; background:#555; }

  .right{ flex:0 0 380px; max-width:440px; min-width:320px; background:#fff; border-left:1px solid var(--line); display:flex; flex-direction:column; min-height:0; }
  .rhead{ padding:11px 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .rhead b{ font-size:14px; }
  .rhead label{ font-size:12px; color:var(--muted); display:inline-flex; align-items:center; gap:5px; cursor:pointer; }
  .rhead .count{ margin-left:auto; font-size:12px; color:var(--teal); font-weight:700; }

  .scroll{ flex:1; overflow-y:auto; padding:12px 13px 90px; scroll-behavior:smooth; }
  .general{ margin-bottom:12px; }
  .general label{ display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; }
  .general textarea{ width:100%; min-height:50px; resize:vertical; border:1px solid var(--line); border-radius:8px; padding:9px 10px; font-family:inherit; font-size:13px; line-height:1.5; }

  .pcard{ border:1px solid var(--line); border-radius:10px; padding:9px 11px; margin-bottom:9px; background:#fcfcfd; scroll-margin-top:8px; transition:border-color .15s, box-shadow .15s, background .15s; }
  .pcard .top{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .pcard .pg{ font-size:13px; font-weight:700; color:var(--teal); }
  .pcard .lbl{ font-size:11px; color:var(--muted); }
  .pcard .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); margin-left:auto; opacity:0; }
  .pcard.has .dot{ opacity:1; }
  .pcard .jump{ border:1px solid var(--line); background:#fff; color:var(--muted); border-radius:6px; font-size:11px; padding:3px 8px; cursor:pointer; }
  .pcard .jump:hover{ border-color:var(--teal); color:var(--teal); }
  .pcard textarea{ width:100%; min-height:40px; resize:vertical; border:1px solid var(--line); border-radius:7px; padding:7px 9px; font-family:inherit; font-size:13px; line-height:1.5; background:#fff; }
  .pcard.active{ border-color:var(--teal); box-shadow:0 0 0 3px rgba(8,75,70,.12); background:#fff; }
  .pcard.active .pg{ font-size:14px; }

  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:#0d2a26; color:#fff; padding:12px 18px; border-radius:10px; font-size:14px; box-shadow:0 8px 30px rgba(0,0,0,.3); opacity:0; pointer-events:none; transition:.25s; max-width:80vw; text-align:center; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast b{ color:var(--gold); }
</style>
</head>
<body>
<header>
  <h1>187 리플렛 검토</h1>
  <span class="cur" id="cur">현재: —</span>
  <span class="spacer"></span>
  <span class="saved" id="saved">자동 저장됨</span>
  <button class="btn btn-ghost" id="btnReload">↻ 새로고침</button>
  <button class="btn btn-primary" id="btnSubmit">📤 검토 전달</button>
</header>

<main>
  <div class="compare">
    <div class="pane">
      <div class="pane-hd">원본 (영어)</div>
      <div class="wrap"><iframe id="fEN"></iframe></div>
    </div>
    <div class="pane">
      <div class="pane-hd ko">한글</div>
      <div class="wrap"><iframe id="fKO"></iframe></div>
    </div>
  </div>
  <aside class="right">
    <div class="rhead">
      <b>수정사항</b>
      <label><input type="checkbox" id="followChk" checked> 스크롤 따라가기</label>
      <label><input type="checkbox" id="onlyChk"> 현재만</label>
      <span class="count" id="count">작성 0</span>
    </div>
    <div class="scroll" id="scroll">
      <div class="general">
        <label>전체 메모 (전반적인 의견)</label>
        <textarea id="general" placeholder="예) 전체적으로 폰트가 조금 작아요 / 톤을 더 부드럽게…"></textarea>
      </div>
      <div id="cards"></div>
    </div>
  </aside>
</main>

<div class="toast" id="toast"></div>

<script>
const PAGE_LABELS = {
  p00:"표지", p01:"표지 안쪽", p02:"사진", p03:"도입 질문", p04:"오시는 길(지도)", p05:"병원 개요",
  p06:"원장 소개", p07:"원장 인사말", p08:"섹션 · 필요성", p09:"인용", p10:"섹션 · 대상", p11:"치료 대상",
  p12:"섹션 · 과정", p13:"치료 과정", p14:"섹션 · 왜 187", p15:"결과 요약", p16:"섹션 · 부작용",
  p17:"부작용 상세", p18:"FAQ Q1~3", p19:"FAQ Q4~7", p20:"메시지", p21:"사진", p22:"치료사례 01",
  p23:"X-ray 01", p24:"치료사례 02", p25:"X-ray 02", p26:"치료사례 03", p27:"X-ray 03",
  p28:"시설 · 2층", p29:"대기실", p30:"진료실", p31:"치료실", p32:"3층 입구", p33:"3층 센터",
  p34:"셀럽 인트로", p35:"셀럽", p36:"셀럽", p37:"셀럽", p38:"셀럽", p39:"셀럽", p40:"셀럽",
  p41:"셀럽", p42:"셀럽", p43:"셀럽", p44:"추천사", p45:"사진", p46:"글로벌 사업", p47:"지도",
  p48:"글로벌", p49:"글로벌", p50:"의료 파트너", p51:"글로벌", p52:"파트너", p53:"뒷표지", p54:"뒷표지"
};
const PAGES = Array.from({length:55}, (_,i)=>"p"+String(i).padStart(2,"0"));

const KEY="leaflet_review_v2";
let state = { general:"", pages:{} };
const $=s=>document.querySelector(s);
const cardsEl=$("#cards");
let followMode=true, onlyMode=false;

let savedT;
function flashSaved(){ const s=$("#saved"); s.textContent="✓ 저장됨"; clearTimeout(savedT); savedT=setTimeout(()=>s.textContent="자동 저장됨",1100); }
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); flashSaved(); updateCount(); }
function updateCount(){
  const n=Object.values(state.pages).filter(t=>(t||"").trim()).length + ((state.general||"").trim()?1:0);
  $("#count").textContent="작성 "+n;
}
function buildCards(){
  cardsEl.innerHTML="";
  PAGES.forEach(p=>{
    const d=document.createElement("div"); d.className="pcard"; d.dataset.page=p;
    d.innerHTML=`<div class="top"><span class="pg">${p}</span><span class="lbl">${PAGE_LABELS[p]||""}</span><span class="dot"></span>
        <button class="jump" data-page="${p}">이 페이지 보기</button></div>
      <textarea data-page="${p}" placeholder="${p} 수정사항…"></textarea>`;
    cardsEl.appendChild(d);
  });
  PAGES.forEach(p=>{ const ta=cardsEl.querySelector(`textarea[data-page="${p}"]`); if(ta) ta.value=state.pages[p]||""; markHas(p); });
}
function markHas(p){ const c=cardsEl.querySelector(`.pcard[data-page="${p}"]`); if(c) c.classList.toggle("has", !!(state.pages[p]||"").trim()); }

cardsEl.addEventListener("input", e=>{ if(e.target.tagName==="TEXTAREA"){ const p=e.target.dataset.page; state.pages[p]=e.target.value; markHas(p); save(); } });
cardsEl.addEventListener("click", e=>{ if(e.target.classList.contains("jump")) jumpTo(e.target.dataset.page); });
$("#general").addEventListener("input", e=>{ state.general=e.target.value; save(); });
$("#followChk").addEventListener("change", e=>{ followMode=e.target.checked; });
$("#onlyChk").addEventListener("change", e=>{ onlyMode=e.target.checked; applyOnly(); if(onlyMode){ followMode=true; $("#followChk").checked=true; } });
function applyOnly(){ cardsEl.querySelectorAll(".pcard").forEach(c=> c.style.display=(!onlyMode||c.dataset.page===currentPage)?"":"none"); }

$("#btnReload").addEventListener("click", ()=>{ fEN.src="dist/en/index.html?t="+Date.now(); fKO.src="dist/ko/index.html?t="+Date.now(); });

// ── 두 리플렛: 좌우 + 스크롤 동기화 ──
const fEN=$("#fEN"), fKO=$("#fKO");
fEN.src="dist/en/index.html?t="+Date.now(); fKO.src="dist/ko/index.html?t="+Date.now();
let currentPage="p00", lastPage=null, loaded=0, scrollLock=false;

function fit(f){ try{ const r=Math.min(1,(f.clientWidth-2)/810); f.contentDocument.documentElement.style.zoom=r; }catch(e){} }
function secs(f){ try{ return f.contentDocument.querySelectorAll("section.page"); }catch(e){ return []; } }
function jumpTo(p){ const i=PAGES.indexOf(p); [fEN,fKO].forEach(f=>{ const s=secs(f); if(s[i]) s[i].scrollIntoView({behavior:"smooth",block:"start"}); }); }

function setActive(p){
  cardsEl.querySelectorAll(".pcard").forEach(c=> c.classList.toggle("active", c.dataset.page===p));
  $("#cur").textContent="현재: "+p+(PAGE_LABELS[p]?" · "+PAGE_LABELS[p]:"");
  if(onlyMode) applyOnly();
  if(followMode){ const c=cardsEl.querySelector(`.pcard[data-page="${p}"]`); if(c) c.scrollIntoView({behavior:"smooth", block:onlyMode?"start":"center"}); }
}
function track(){
  const s=secs(fKO); if(!s.length) return;
  const mid=(fKO.contentWindow.scrollY||0)+(fKO.contentWindow.innerHeight||0)/2;
  let best=0,bd=1e9; s.forEach((sec,i)=>{ const c=sec.offsetTop+sec.offsetHeight/2; const d=Math.abs(c-mid); if(d<bd){bd=d;best=i;} });
  const p=PAGES[best]||"p00"; currentPage=p;
  if(p!==lastPage){ lastPage=p; setActive(p); }
}
// rAF 폴링 동기화: 두 iframe 중 변한 쪽을 다른 쪽에 미러 (이벤트보다 확실)
let lastEN=-1, lastKO=-1, fitted=false;
function ready(f){ try{ return f.contentWindow && f.contentDocument && f.contentDocument.readyState!=="loading" && f.contentDocument.querySelector("section.page"); }catch(e){ return false; } }
function syncLoop(){
  try{
    if(ready(fEN) && ready(fKO)){
      if(!fitted){ fit(fEN); fit(fKO); lastEN=fEN.contentWindow.scrollY; lastKO=fKO.contentWindow.scrollY; fitted=true; lastPage=null; track(); }
      const ey=fEN.contentWindow.scrollY, ky=fKO.contentWindow.scrollY;
      if(Math.abs(ey-lastEN)>0.5){ lastEN=ey; fKO.contentWindow.scrollTo(0,ey); lastKO=fKO.contentWindow.scrollY; track(); }
      else if(Math.abs(ky-lastKO)>0.5){ lastKO=ky; fEN.contentWindow.scrollTo(0,ky); lastEN=fEN.contentWindow.scrollY; track(); }
    } else { fitted=false; }
  }catch(e){}
  requestAnimationFrame(syncLoop);
}
requestAnimationFrame(syncLoop);
fEN.addEventListener("load", ()=>{ fitted=false; });
fKO.addEventListener("load", ()=>{ fitted=false; });
let rt; window.addEventListener("resize", ()=>{ clearTimeout(rt); rt=setTimeout(()=>{ fit(fEN); fit(fKO); }, 150); });

// ── 제출 ──
$("#btnSubmit").addEventListener("click", async ()=>{
  const notes=PAGES.filter(p=>(state.pages[p]||"").trim()).map(p=>({page:p,text:state.pages[p].trim()}));
  const payload={ general:(state.general||"").trim(), notes };
  try{
    const r=await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(!r.ok) throw 0;
    toast(`✅ 전달 완료! (${notes.length+(payload.general?1:0)}건) 채팅에 <b>“검토 반영해줘”</b> 라고 말씀하세요.`);
  }catch(e){ toast("⚠️ 저장 실패 — review_server.py 가 켜져 있는지 확인하세요."); }
});
const toastEl=$("#toast"); let toastT;
function toast(html){ toastEl.innerHTML=html; toastEl.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("show"),5000); }

// ── 초기 로드 ──
(async ()=>{
  let L=null;
  try{ const r=await fetch("/api/load"); const j=await r.json(); if(j&&(j.general||(j.notes&&j.notes.length))) L=j; }catch(e){}
  if(!L){ try{ L=JSON.parse(localStorage.getItem(KEY)); }catch(e){} }
  if(L){ state.general=L.general||""; if(L.pages) state.pages=L.pages; else if(Array.isArray(L.notes)) L.notes.forEach(n=>{ if(n.page) state.pages[n.page]=n.text||""; }); }
  $("#general").value=state.general||"";
  buildCards(); updateCount();
})();
</script>
</body>
</html>
