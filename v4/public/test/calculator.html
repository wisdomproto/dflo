<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예상키 측정 | 187 성장클리닉</title>
<link rel="stylesheet" href="_shell.css">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #4a463f; background: #fafaf8; font-size: 15px; line-height: 1.7;
    word-break: keep-all; -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1024px; margin: 0 auto; background: #fafaf8; }

  /* Iframe wrapper — fill viewport between fixed top header and bottom nav */
  .calc-iframe-wrap {
    width: 100%;
    height: calc(100vh - 128px);
    min-height: 520px;
    overflow: hidden;
    background: #fff;
  }
  .calc-iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
</style>
</head>

<body data-page="calc">
<div class="t-page">
<div class="container">

  <div class="calc-iframe-wrap">
    <iframe src="/calc-embed" title="예상키 측정" loading="eager"></iframe>
  </div>

</div>
</div><!-- /.t-page -->

<script src="_shell.js"></script>

</body>
</html>
