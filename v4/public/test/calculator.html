<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예상키 측정 | 187 성장클리닉</title>
<link rel="stylesheet" href="_shell.css">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #444; background: #fff; font-size: 15px; line-height: 1.7;
    word-break: keep-all; -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 640px; margin: 0 auto; background: #fff; }

  .calc-page { padding: 16px 24px 28px; }

  .calc-page .header {
    text-align: center;
    margin-bottom: 18px;
  }
  .calc-page .header .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: #6B3FA0;
    margin-bottom: 8px;
  }
  .calc-page .header h2 {
    font-size: 22px;
    font-weight: 900;
    color: #171717;
    letter-spacing: -0.6px;
    line-height: 1.3;
  }
  .calc-page .header p {
    font-size: 13px;
    color: #777;
    margin-top: 8px;
    line-height: 1.65;
  }

  .calc-form {
    display: flex; flex-direction: column; gap: 18px;
  }
  .calc-form .field-label {
    font-size: 11px;
    font-weight: 700;
    color: #777;
    margin-bottom: 5px;
    display: block;
  }
  .calc-form .gender-row { display: flex; gap: 8px; }
  .calc-form .gender-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 0;
    font-size: 14px;
    font-weight: 700;
    background: #f3f4f6;
    color: #6b7280;
    cursor: pointer;
    transition: all 0.15s;
  }
  .calc-form .gender-btn.active { background: #6B3FA0; color: #fff; }
  .calc-form input[type="date"],
  .calc-form input[type="number"] {
    width: 100%;
    padding: 13px 15px;
    border: 1px solid #e8eaf0;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    background: #fff;
    color: #171717;
  }
  .calc-form input:focus { outline: none; border-color: #6B3FA0; }
  .calc-form .calc-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 0;
    background: #6B3FA0;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    margin-top: 6px;
  }
  .calc-form .calc-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .calc-form .calc-btn:active:not(:disabled) { transform: scale(0.98); }

  /* Result */
  .calc-result { display: none; flex-direction: column; gap: 16px; }
  .calc-result.is-shown { display: flex; }
  .calc-result .hero-card {
    background: #f3edfa;
    border-radius: 18px;
    padding: 28px 22px;
    text-align: center;
  }
  .calc-result .hero-card .label {
    font-size: 12px;
    font-weight: 700;
    color: #6B3FA0;
    margin-bottom: 6px;
  }
  .calc-result .hero-card .number {
    font-size: 56px;
    font-weight: 900;
    color: #6B3FA0;
    line-height: 1;
    letter-spacing: -1px;
  }
  .calc-result .hero-card .number .unit {
    font-size: 22px;
    font-weight: 700;
  }
  .calc-result .hero-card .meta {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .calc-result .hero-card .pill {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
  }
  .calc-result .hero-card .pill.solid { background: #6B3FA0; color: #fff; }
  .calc-result .hero-card .pill.outline { background: #fff; color: #6B3FA0; }

  .calc-result .interpretation {
    background: #fffbeb;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    color: #92400e;
    line-height: 1.55;
    text-align: center;
    font-weight: 600;
  }
  .calc-result .note {
    background: #f7f8fb;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 11.5px;
    color: #777;
    line-height: 1.6;
  }
  .calc-result .note strong { color: #171717; }
  .calc-result .kakao-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: #FAE100;
    color: #1a1a1a;
    font-weight: 800;
    font-size: 15px;
    padding: 16px;
    border-radius: 14px;
    text-decoration: none;
    transition: transform 0.15s;
  }
  .calc-result .kakao-cta:active { transform: scale(0.98); }
  .calc-result .reset-btn {
    background: transparent;
    border: 0;
    color: #777;
    font-size: 13px;
    font-weight: 600;
    text-decoration: underline;
    cursor: pointer;
    padding: 8px;
  }
</style>
</head>

<body data-page="calc">
<div class="t-page">
<div class="container">

  <div class="calc-page">
    <div class="header">
      <span class="badge">성장 진단</span>
      <h2>우리 아이 예상 키 측정</h2>
      <p>간단한 정보만 입력하면 예상 성인 키를 바로 확인할 수 있어요</p>
    </div>

    <!-- Form -->
    <div class="calc-form" id="calc-form">
      <div>
        <span class="field-label">성별</span>
        <div class="gender-row">
          <button type="button" class="gender-btn active" data-gender="male">👦 남아</button>
          <button type="button" class="gender-btn" data-gender="female">👧 여아</button>
        </div>
      </div>

      <div>
        <label class="field-label" for="calc-birth">생년월일</label>
        <input type="date" id="calc-birth">
      </div>

      <div>
        <label class="field-label" for="calc-height">현재 키 (cm)</label>
        <input type="number" id="calc-height" inputmode="decimal" step="0.1" placeholder="예: 132.5">
      </div>

      <button type="button" id="calc-submit" class="calc-btn" disabled>📊 예상키 계산하기</button>
    </div>

    <!-- Result -->
    <div class="calc-result" id="calc-result">
      <div class="hero-card">
        <p class="label">우리 아이 예상 성인 키</p>
        <p class="number"><span class="number-text">0.0</span><span class="unit">cm</span></p>
        <div class="meta">
          <span class="pill solid">남아 · 0세</span>
          <span class="pill outline">현재 0cm · 0%</span>
        </div>
      </div>
      <p class="interpretation">📋 결과를 분석 중입니다…</p>
      <div class="note">
        <strong>📊 측정 원리:</strong> 한국 질병관리청(2017) 소아·청소년 성장 표준 (LMS 방법) 기반.<br>
        <strong>🎯 예상 키:</strong> 현재 키의 백분위를 유지한다는 가정 하에 18세 시점 동일 백분위 키를 역산.<br>
        <strong>⚠️ 참고:</strong> 골연령·호르몬·영양 상태는 반영되지 않은 통계적 추정치입니다.
      </div>
      <a href="https://pf.kakao.com/_ZxneSb" target="_blank" rel="noopener" class="kakao-cta">
        💬 전문 상담 받아보세요
      </a>
      <button type="button" class="reset-btn" id="calc-reset">다시 계산하기</button>
    </div>
  </div>

</div>
</div><!-- /.t-page -->

<script src="_shell.js"></script>
<script>
  (function() {
    const calc = window.t?.calc;
    if (!calc) return;

    let gender = 'male';
    const genderBtns = document.querySelectorAll('.gender-btn');
    const heightInput = document.getElementById('calc-height');
    const birthInput = document.getElementById('calc-birth');
    const submitBtn = document.getElementById('calc-submit');
    const formEl = document.getElementById('calc-form');
    const resultEl = document.getElementById('calc-result');
    const resetBtn = document.getElementById('calc-reset');

    birthInput.max = new Date().toISOString().split('T')[0];

    genderBtns.forEach(b => b.addEventListener('click', () => {
      gender = b.dataset.gender;
      genderBtns.forEach(x => x.classList.toggle('active', x.dataset.gender === gender));
    }));

    const validate = () => {
      const ok = birthInput.value && parseFloat(heightInput.value) > 0;
      submitBtn.disabled = !ok;
    };
    heightInput.addEventListener('input', validate);
    birthInput.addEventListener('change', validate);

    submitBtn.addEventListener('click', () => {
      const h = parseFloat(heightInput.value);
      if (!birthInput.value || !h) return;
      const age = calc.calculateAge(birthInput.value);
      const pct = calc.calcPercentile(h, age.decimal, gender);
      const pred = calc.predictAdultHeight(h, age.decimal, gender);

      const numEl = resultEl.querySelector('.number-text');
      const meta1 = resultEl.querySelector('.pill.solid');
      const meta2 = resultEl.querySelector('.pill.outline');
      const interp = resultEl.querySelector('.interpretation');

      // Count up
      const start = performance.now();
      const dur = 1000;
      const tick = (now) => {
        const t = Math.min((now - start) / dur, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        numEl.textContent = (eased * pred).toFixed(1);
        if (t < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);

      meta1.textContent = `${gender === 'male' ? '남아' : '여아'} · ${age.years}세 ${age.months}개월`;
      meta2.textContent = `현재 ${h}cm · ${pct.toFixed(0)}%`;
      interp.textContent = pct >= 75 ? '📋 또래 대비 큰 편이에요'
        : pct >= 50 ? '📋 또래 평균 수준입니다'
        : pct >= 25 ? '📋 또래보다 약간 작은 편이에요'
        : '📋 또래 대비 작은 편 — 골든타임입니다';

      formEl.style.display = 'none';
      resultEl.classList.add('is-shown');
      resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    resetBtn.addEventListener('click', () => {
      resultEl.classList.remove('is-shown');
      formEl.style.display = '';
    });
  })();
</script>

</body>
</html>
