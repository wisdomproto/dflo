      cap_suffix: " check"
  treat_subhead: "Treatment — Growth-stimulating exercise + healthy development"
  treat_lead: "Our in-house GYM offers 1:1 trainer-led exercise designed for growing children. Stretching, posture correction, and fascial release support good posture and body balance."
  equip_main_alt: "Growth exercise equipment"
  equip_row_alt: "Growth exercise program equipment"
  cta_label: "Worried about posture or development? &nbsp;1:1 expert consultation"

