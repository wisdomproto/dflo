obesity:
  eyebrow: "01 / Obesity-driven growth care"
  heading_line1: "Does weight gain mean more height?"
  heading_line2: ""
  heading_accent: "Obesity-driven growth"
  heading_line3: " calls for a different approach"
  lead: "Childhood obesity is more than a weight issue — it can affect sex-hormone secretion and the pace of puberty. Weight, growth velocity, and lifestyle habits should be reviewed together."
  bmi_panel:
    - img_alt: "Childhood obesity diagnostic criteria"
  subsection1_eyebrow: "Childhood obesity & height"
  subsection1_heading_line1: "Body fat in growing children"
  subsection1_heading_accent: "doesn't always turn into height"
  subsection1_lead: "Excess body fat can interfere with growth-hormone action and puberty progression. Weight management during growth is not a diet — it is about <strong>building a healthy environment for growth</strong>."
  waffle_img_alt: "High-calorie food and childhood obesity"
  subsection2_heading_line1: "Childhood obesity"
  subsection2_heading_accent: "is different from adult obesity"
  subsection2_lead: "During growth, both the size and the number of fat cells — along with the metabolic environment — can change. That is why early management matters."
  fatcell_img_alt: "Increase in fat-cell number and size"
  risks_eyebrow: "Why childhood obesity matters"
  risks_heading_part1: "Why does it "
  risks_heading_accent: "need attention?"
  risks:
    - img_alt: "Adult obesity risk"
      title: "Adult obesity"
      desc: "Childhood obesity often carries into adult weight problems."
    - img_alt: "Metabolic disease risk"
      title: "Metabolic health"
      desc: "Linked to blood-sugar, blood-pressure, and skin issues."
    - img_alt: "Height growth interference"
      title: "Growth interference"
      desc: "Body fat and puberty pace can change how the growth plates develop."
    - img_alt: "Emotional impact"
      title: "Emotional impact"
      desc: "Body-image concerns can affect confidence and friendships."
  causes_eyebrow: "Why is it on the rise?"
  causes_heading_accent: "The causes of childhood obesity"
  causes_heading_part2: " — checked together"
  causes:
    - img_alt: "Energy imbalance"
      title: "Energy imbalance"
      desc: "Late-night meals, high-calorie snacks, irregular eating"
    - img_alt: "Genetic factors"
      title: "Genetic factors"
      desc: "Family history considered alongside environment"
    - img_alt: "Endocrine factors"
      title: "Endocrine factors"
      desc: "Appetite, metabolism, and hormone balance reviewed"
    - img_alt: "Lifestyle factors"
      title: "Lifestyle factors"
      desc: "Reduced activity and Westernized eating patterns"
  lifestyle_heading_line1: "Lifestyle habits to ease"
  lifestyle_heading_accent: "childhood obesity"
  lifestyle_lead: "We balance both weight and growth by considering the nutrition and activity a growing child needs."
  lifestyle_cards:
    - img_alt: "Diet care"
      num: "01 / Diet"
      title: "Balanced meals"
      desc: "Cut high-calorie snacks; balance protein, vegetables, and fiber."
    - img_alt: "Reducing screen time"
      num: "02 / Lifestyle"
      title: "Manage screen time"
      desc: "Reduce TV, gaming, and smartphone hours; raise daily activity."
    - img_alt: "Physical activity"
      num: "03 / Activity"
      title: "Daily movement"
      desc: "Walking, stairs, and light exercise keep growth-stage activity up."
    - img_alt: "Sleep care"
      num: "04 / Sleep"
      title: "Regular sleep"
      desc: "Sleep rhythm matters for both weight control and the growth environment."
  cta_label: "Worried about your child's weight or growth? &nbsp;1:1 expert consultation"

precocious:
  eyebrow: "02 / Early puberty care"
  heading_line1: "When puberty starts early,"
  heading_accent: "growth-plate pace"
  heading_line2: " also needs a check"
  lead: "Precocious puberty refers to secondary sex traits appearing before age 8 in girls and age 9 in boys. Faster puberty can also accelerate growth-plate changes, so checking the current status matters."
  chart_panel:
    - ctitle: "Precocious puberty patients in Korea, 2016–2020"
      csrc: "Source: Health Insurance Review and Assessment Service"
      cunit: "Unit: persons"
      img_alt: "Number of precocious puberty patients in Korea, 2016–2020"
  subsection1_eyebrow: "Early puberty & height"
  subsection1_heading_accent: "How early puberty"
  subsection1_heading_part2: " affects height growth"
  subsection1_lead: "When sex hormones are released early, height may briefly seem to grow fast. But growth-plate changes accelerate afterwards, which can affect the final adult height."
  height_img_alt: "Early puberty and growth velocity relationship"
  subsection2_heading_line1: "Care for early puberty looks at"
  subsection2_heading_accent: "puberty pace and growth velocity"
  subsection2_heading_line2: " together"
  subsection2_lead: "Treating precocious puberty is not just about sex hormones — it requires reviewing growth velocity, growth-plate status, sleep, nutrition, and weight together."
  arrow_img_alt: "Care for precocious puberty and growth-pace management"
  causes_eyebrow: "Why so young?"
  causes_heading_accent: "Causes of early puberty"
  causes_heading_part2: " — checked together"
  causes:
    - img_alt: "Underlying medical conditions"
      cap_line1: "Conditions in the brain,"
      cap_line2: "ovaries, or testes"
    - img_alt: "Dietary factors"
      cap_line1: "Heavy meat or processed,"
      cap_line2: "high-fat diet"
    - img_alt: "Obesity factor"
      cap_line1: "Obesity linked to"
      cap_line2: "sex-hormone activity"
    - img_alt: "Endocrine disruptors"
      cap_line1: "High exposure to"
      cap_line2: "endocrine disruptors"
    - img_alt: "Lack of activity"
      cap_line1: "Low physical activity"
      cap_line2: "(gaming, TV)"
    - img_alt: "Stress factor"
      cap_line1: "Heavy academic or"
      cap_line2: "lifestyle stress"
  cta_label: "Is puberty progressing too fast? &nbsp;1:1 expert consultation"

proportion:
  eyebrow: "03 / Body-proportion care"
  heading_line1: "As important as height —"
  heading_accent: "balanced body proportions"
  heading_line2: ""
  lead: "Beyond height, body proportion, posture, and lower-body balance shape a child's overall impression and confidence. Looking at proportion alongside height matters during growth."
  ratio_img_alt: "Golden ratio and ideal body-proportion guide"
  subsection1_heading_line1: "Early puberty and"
  subsection1_heading_accent: "changes in body proportion"
  subsection1_lead: "When puberty starts and how fast growth happens both shape the upper- and lower-body balance. Reviewing growth-plate status and pubertal stage helps manage proportion alongside height."
  comparison_img_alt: "Upper-body and lower-body proportion comparison"
  quote: "When puberty begins and how growth unfolds can shape final body proportions."
  cta_label: "Concerned about body balance? &nbsp;1:1 expert consultation"

bodywork:
  eyebrow: "04 / Posture & development care"
  heading_line1: "Posture and body shape also affect"
  heading_accent: "the growth environment"
  heading_line2: ""
  lead: "Poor posture, muscle and fascial tension, and spine or pelvic imbalance can throw off a child's body balance. We review both body shape and developmental status through diagnosis and exercise care."
  diag_subhead: "Diagnosis — Whole-body X-ray analysis"
  xray_img_alt: "Whole-body X-ray posture analysis"
  diag_lead: "We screen for scoliosis, lumbar lordosis, forward head, and bow legs or knock knees (O- / X-legs) that can appear during growth, then guide the right care direction for your child."
  problems:
    - img_alt: "Scoliosis"
      cap_strong: "Scoliosis"
      cap_suffix: " check"
    - img_alt: "Lumbar lordosis"
      cap_strong: "Lumbar lordosis"
