ko:
  title: "187 성장클리닉 | 우리 아이 예상키 무료 측정"
  description: "사춘기·수면·체중·자세까지 통합 분석. 연세새봄 187 성장클리닉의 다각도 성장 관리. 예상키 무료 측정 + 1:1 카카오톡 상담."
  og_image: "/test/og/og-ko.jpg"
  faq:
    - q: "성장 검사는 몇 살부터 받을 수 있나요?"
      a: "만 3세부터 가능합니다. 또래보다 키가 작거나 성장 속도가 느린 경우 조기 검사를 권장합니다."
    - q: "성장호르몬 치료는 모든 아이에게 효과가 있나요?"
      a: "성장판이 닫히기 전, 호르몬 분비량이 부족한 경우에 효과를 기대할 수 있습니다. 검사로 적합 여부를 먼저 확인합니다."
    - q: "치료 비용은 얼마나 드나요?"
      a: "검사 종류와 치료 방법에 따라 다릅니다. 1:1 상담을 통해 개별 안내드립니다."
    - q: "성조숙증은 왜 관리해야 하나요?"
      a: "사춘기가 또래보다 1년 이상 빠르면 성장판이 일찍 닫혀 최종 키에 영향을 줄 수 있습니다."
    - q: "비대면 상담도 가능한가요?"
      a: "카카오톡으로 1차 상담 가능합니다. 정밀 검사·치료는 내원이 필요합니다."

th:
  title: "187 Growth Clinic | คาดการณ์ส่วนสูงผู้ใหญ่ของลูกฟรี"
  description: "ดูแลการเจริญเติบโตแบบครบวงจรครอบคลุมวัยรุ่น การนอน น้ำหนัก และท่าทาง คลินิก Yonsei Saebom 187 Growth คาดการณ์ส่วนสูงผู้ใหญ่ฟรี + ปรึกษา KakaoTalk 1:1"
  og_image: "/test/og/og-th.jpg"
  faq:
    - q: "เด็กอายุเท่าไหร่จึงจะตรวจการเจริญเติบโตได้?"
      a: "ตั้งแต่อายุ 3 ปี แนะนำตรวจแต่เนิ่นๆ สำหรับเด็กที่ตัวเล็กกว่าวัยเดียวกันหรือมีความเร็วการเติบโตช้า"
    - q: "การรักษาด้วยโกรทฮอร์โมนได้ผลกับเด็กทุกคนไหม?"
      a: "มีประสิทธิภาพสูงสุดเมื่อแผ่นกระดูกอ่อนยังเปิดอยู่และการหลั่งฮอร์โมนไม่เพียงพอ ตรวจประเมินความเหมาะสมก่อน"
    - q: "ค่ารักษาเท่าไหร่?"
      a: "ขึ้นอยู่กับประเภทของการตรวจและการรักษา ให้คำแนะนำเฉพาะบุคคลผ่านการปรึกษา 1:1"
    - q: "ทำไมต้องดูแลภาวะวัยรุ่นก่อนกำหนด?"
      a: "หากเข้าสู่วัยรุ่นเร็วกว่าวัยเดียวกันมากกว่า 1 ปี แผ่นกระดูกอ่อนอาจปิดเร็วและส่งผลให้ส่วนสูงสุดท้ายต่ำลง"
    - q: "ปรึกษาทางไกลได้ไหม?"
      a: "ปรึกษาเบื้องต้นทาง KakaoTalk การตรวจและรักษาแบบละเอียดต้องเข้ามาที่คลินิก"

vi:
  title: "187 Growth Clinic | Dự đoán chiều cao trưởng thành"
  description: "Chăm sóc tăng trưởng tích hợp: dậy thì, giấc ngủ, cân nặng, tư thế. Dự đoán chiều cao miễn phí + tư vấn KakaoTalk 1:1 tại Yonsei Saebom 187 Growth Clinic."
  og_image: "/test/og/og-vi.jpg"
  faq:
    - q: "Trẻ từ mấy tuổi có thể được kiểm tra tăng trưởng?"
      a: "Từ 3 tuổi. Khuyến nghị kiểm tra sớm cho trẻ thấp hơn rõ rệt so với bạn cùng tuổi hoặc có tốc độ tăng trưởng chậm."
    - q: "Điều trị hormone tăng trưởng có hiệu quả với mọi trẻ không?"
      a: "Hiệu quả cao nhất khi sụn tăng trưởng còn mở và tiết hormone không đủ. Chúng tôi xác nhận mức độ phù hợp qua kiểm tra trước khi điều trị."
    - q: "Chi phí điều trị là bao nhiêu?"
      a: "Tùy thuộc vào loại kiểm tra và điều trị. Hướng dẫn cá nhân được cung cấp qua tư vấn 1:1."
    - q: "Vì sao cần điều trị dậy thì sớm?"
      a: "Dậy thì sớm hơn 1 năm so với bạn cùng tuổi có thể đóng sụn tăng trưởng sớm và dẫn đến chiều cao trưởng thành cuối cùng thấp hơn."
    - q: "Có thể tư vấn từ xa không?"
      a: "Tư vấn ban đầu có sẵn qua KakaoTalk. Kiểm tra và điều trị chi tiết yêu cầu đến trực tiếp."

en:
  title: "187 Growth Clinic | Free Adult-Height Prediction"
  description: "Integrated growth care covering puberty, sleep, weight, and posture. Free adult-height prediction + 1:1 KakaoTalk consultation at Yonsei Saebom 187 Growth Clinic."
  og_image: "/test/og/og-en.jpg"
  faq:
    - q: "From what age can a child get a growth assessment?"
      a: "From age 3. Early assessment is recommended for children noticeably shorter than peers or with a slow growth pace."
    - q: "Does growth-hormone treatment work for every child?"
      a: "It is most effective when the growth plates are still open and hormone secretion is insufficient. We confirm suitability through assessment first."
    - q: "How much does treatment cost?"
      a: "It depends on the type of assessment and treatment. Individual guidance is provided through a 1:1 consultation."
    - q: "Why does precocious puberty need to be managed?"
      a: "Puberty more than a year ahead of peers can close the growth plates early and lead to a shorter final adult height."
    - q: "Is a remote consultation available?"
      a: "First-touch consultations are available on KakaoTalk. Detailed assessment and treatment require an in-person visit."
