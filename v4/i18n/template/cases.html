<!DOCTYPE html>
<html lang="{{meta.lang}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{{seo_head}}
<link rel="stylesheet" href="/_shell.css">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #444; background: #fff; font-size: 15px; line-height: 1.7;
    word-break: keep-all; -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1024px; margin: 0 auto; background: #fff; }

  /* ===== 뷰어 모드 (?case=N) — iframe 한 장이 화면을 꽉 채우는 구조 =====
     바깥 페이지는 스크롤하지 않고 iframe 안의 콘텐츠만 스크롤한다.
     _shell.css 의 .t-page padding-bottom(88) 을 제거하고 높이를 100vh 로 고정해 이중 스크롤바를 막는다. */
  body[data-page="cases"].is-viewer .t-page {
    height: 100vh;
    padding-bottom: 0;
    overflow: hidden;
  }

  /* Iframe wrapper — fill viewport between fixed top header and floating bottom nav.
     상단 "다른 사례 보기" 바(40px)만큼 추가로 뺀다. */
  .cases-iframe-wrap {
    width: 100%;
    /* viewport - top header (52) - back bar (40) - floating nav clearance (76) */
    height: calc(100vh - 168px);
    min-height: 440px;
    overflow: hidden;
    background: #fff;
  }
  .cases-iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .rc-back {
    display: flex;
    align-items: center;
    height: 40px;
    padding: 0 16px;
    border-bottom: 1px solid #e8eaf0;
  }
  .rc-back a {
    font-size: 13px;
    font-weight: 700;
    color: #4A2D6B;
    text-decoration: none;
  }

  /* ===== 메뉴 모드 (기본) — 케이스 버튼 2×2 + 메신저(LINE/카톡) 게이트 =====
     스와이프 배너 대신 능동 선택형: 4개는 고민 유형이 다른 무료 맛보기,
     아래 게이트가 "전체 사례 → 메신저" 리드 전환 다리.
     카드는 케이스별 컬러(--cc)와 이모지 아바타 + before→after 숫자가 주인공. */
  .rc-menu {
    padding: 32px 20px 56px;
    background:
      radial-gradient(640px 240px at 50% -60px, rgba(74,45,107,0.10), rgba(74,45,107,0) 70%),
      #fff;
  }
  .rc-head { text-align: center; max-width: 560px; margin: 0 auto 26px; }
  .rc-head .eyebrow {
    display: inline-block;
    font-size: 12px; font-weight: 800; letter-spacing: 0.08em;
    color: #4A2D6B; background: rgba(74,45,107,0.09);
    border-radius: 999px; padding: 7px 16px;
  }
  .rc-head h1 {
    margin-top: 16px;
    font-size: 21px; font-weight: 800; color: #171717;
    line-height: 1.45; letter-spacing: -0.5px;
  }
  .rc-head h1 .accent {
    background: linear-gradient(120deg, #667eea, #764ba2);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: #764ba2;
    font-weight: 900;
  }
  .rc-head .lead {
    font-size: 14px; color: #777; line-height: 1.8; margin-top: 12px;
  }
  .rc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 560px;
    margin: 0 auto;
  }
  .rc-card {
    display: flex;
    flex-direction: column;
    gap: 9px;
    border: 1px solid rgba(23,23,23,0.06);
    border-radius: 18px;
    padding: 16px 15px 13px;
    text-decoration: none;
    box-shadow: 0 3px 14px rgba(26,23,20,0.06);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .rc-card:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(26,23,20,0.13); }
  .rc-card:active { transform: scale(0.98); }
  .rc-top { display: flex; align-items: center; gap: 8px; }
  .rc-avatar {
    flex: none;
    width: 38px; height: 38px; border-radius: 50%;
    background: #fff;
    display: grid; place-items: center;
    font-size: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08), inset 0 0 0 2px var(--cc);
  }
  .rc-tag {
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.01em;
    color: var(--cc);
    background: #fff;
    border-radius: 999px;
    padding: 4px 9px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    line-height: 1.35;
  }
  .rc-stat { display: flex; flex-direction: column; gap: 1px; }
  .rc-from {
    font-size: 11.5px;
    font-weight: 600;
    color: #8a8a8a;
  }
  .rc-to {
    font-size: 23px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.2;
    color: var(--cc);
  }
  .rc-to .u { font-size: 14px; font-weight: 800; }
  .rc-desc {
    font-size: 12px;
    line-height: 1.55;
    color: #6b6b6b;
    word-break: keep-all;
    flex: 1;
  }
  .rc-arrow {
    align-self: flex-end;
    width: 27px; height: 27px; border-radius: 50%;
    background: var(--cc); color: #fff;
    display: grid; place-items: center;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 3px 8px rgba(0,0,0,0.16);
  }
  .rc-line {
    max-width: 560px;
    margin: 26px auto 0;
    text-align: center;
    background: linear-gradient(135deg, #f3eefb, #fdfcff 70%);
    border: 1px solid rgba(74,45,107,0.14);
    border-radius: 20px;
    padding: 26px 22px 24px;
    box-shadow: 0 6px 22px rgba(74,45,107,0.08);
  }
  .rc-line-emo { font-size: 24px; margin-bottom: 8px; letter-spacing: 4px; }
  .rc-line-text {
    font-size: 14.5px;
    font-weight: 700;
    line-height: 1.6;
    color: #171717;
    margin-bottom: 16px;
    word-break: keep-all;
  }
  .rc-line-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 800;
    padding: 16px 30px;
    border-radius: 999px;
    text-decoration: none;
    box-shadow: 0 8px 22px rgba(0,0,0,0.16);
    transition: filter 0.2s ease, transform 0.15s ease;
  }
  .rc-line-btn:hover { filter: brightness(0.94); }
  .rc-line-btn:active { transform: scale(0.98); }

  @media (min-width: 768px) {
    body.is-menu { background: var(--shell-page-bg, #fafaf8); }
    body.is-menu .container {
      max-width: 680px;
      box-shadow: 0 1px 2px rgba(26,23,20,0.05), 0 18px 50px rgba(26,23,20,0.08);
    }
    .rc-menu { padding: 44px 28px 72px; }
    .rc-head h1 { font-size: 24px; }
    .rc-head .lead { font-size: 15.5px; }
    .rc-grid { gap: 14px; }
    .rc-to { font-size: 26px; }
    .rc-desc { font-size: 13px; }
    .rc-line-text { font-size: 16px; }
    .rc-line-btn { font-size: 16.5px; padding: 17px 36px; }
  }
</style>
</head>

<body data-page="cases">
<div class="t-page">
<div class="container">

  <!-- ===== 메뉴 모드 (기본): 케이스 선택 2×2 + 메신저 게이트 ===== -->
  <div class="rc-menu" id="rcMenu" hidden>
    <div class="rc-head">
      <div class="eyebrow">{{realcases.eyebrow}}</div>
      <h1>{{realcases.heading_line1}}<br><span class="accent">{{realcases.heading_accent}}</span></h1>
      <p class="lead">{{realcases.lead}}</p>
    </div>

    <div class="rc-grid">
      {{#each realcases.cards}}
      <a class="rc-card" href="?case={{case}}" style="--cc:{{color}}; background:linear-gradient(165deg, #fff 42%, {{bg}})">
        <span class="rc-top">
          <span class="rc-avatar">{{emoji}}</span>
          <span class="rc-tag">{{tag}}</span>
        </span>
        <span class="rc-stat">
          <span class="rc-from">{{stat_from}}</span>
          <span class="rc-to">&rarr; {{stat_to}}</span>
        </span>
        <span class="rc-desc">{{desc}}</span>
        <span class="rc-arrow">&rarr;</span>
      </a>
      {{/each}}
    </div>

    <div class="rc-line">
      <div class="rc-line-emo">👦👧⚾🌏</div>
      <p class="rc-line-text">{{realcases.line_text}}</p>
      <a class="rc-line-btn" href="{{messenger.url}}" target="_blank" rel="noopener"
         data-source="cases_menu_more" data-channel="{{messenger.channel}}"
         style="background:{{messenger.color_bg}}; color:{{messenger.color_fg}}">
        {{realcases.line_btn}} <span class="arrow">&rarr;</span>
      </a>
    </div>
  </div>

  <!-- ===== 뷰어 모드 (?case=N): 기존 캐러셀 iframe + 돌아가기 바 ===== -->
  <div id="rcViewer" hidden>
    <div class="rc-back"><a href="cases.html">&larr; {{realcases.back_label}}</a></div>
    <div class="cases-iframe-wrap">
      <iframe data-embed-base="/cases-embed?lang={{meta.lang}}" title="{{cases.iframe_title}}" loading="eager"></iframe>
    </div>
  </div>

  <script>
    // ?case=N 이면 뷰어(캐러셀, N번째 케이스에서 시작) / 없으면 선택 메뉴.
    // iframe src 는 뷰어일 때만 세팅 — 메뉴에서 무거운 임베드를 미리 로드하지 않는다.
    (function () {
      var n = new URLSearchParams(location.search).get('case');
      var viewer = document.getElementById('rcViewer');
      var menu = document.getElementById('rcMenu');
      if (n && /^\d+$/.test(n)) {
        var f = viewer.querySelector('iframe');
        f.src = f.getAttribute('data-embed-base') + '&case=' + n;
        viewer.hidden = false;
        document.body.classList.add('is-viewer');
      } else {
        menu.hidden = false;
        document.body.classList.add('is-menu');
      }
    })();
  </script>

</div>
</div><!-- /.t-page -->

<script>
  window.__I18N__ = {
    locale: "{{meta.lang}}",
    channel: "{{messenger.channel}}",
    messenger: {{messenger_json}},
    page_type: "cases",
    shell: {{shell_json}}
  };
</script>
<script src="/_shell.js"></script>

</body>
</html>
